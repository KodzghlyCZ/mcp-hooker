server:
  name: petstore-mcp
  host: 0.0.0.0
  port: 8000

openapi:
  # Remote URL or local path (relative to project root or absolute).
  spec: https://petstore3.swagger.io/api/v3/openapi.json
  fetch_timeout: 30.0

api:
  # Target API base URL. When omitted, servers[0].url from the spec is used.
  base_url: https://petstore3.swagger.io/api/v3
  timeout: 30.0
  headers: {}
  # Example bearer token via environment expansion:
  # headers:
  #   Authorization: "Bearer ${API_TOKEN}"

reload:
  # POST /admin/reload to refresh config + spec. Set token to require Authorization: Bearer <token>.
  token: ""
  # Poll for spec changes (0 = disabled).
  interval_seconds: 0
  on_sighup: true
