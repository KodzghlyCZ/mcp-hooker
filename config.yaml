server:
  name: petstore-mcp
  host: 0.0.0.0
  port: 8000
  # FastMCP rejects non-loopback Host headers when true (421). Keep false for Docker/LAN.
  host_origin_protection: false
  allowed_hosts: []

openapi:
  # Remote URL or local path (relative to project root or absolute).
  spec: https://app.caflou.com/api/v1/i/docs/openapi/v1/openapi.yaml
  fetch_timeout: 30.0

api:
  # Target API base URL. When omitted, servers[0].url from the spec is used.
  base_url: https://petstore3.swagger.io/api/v3
  timeout: 30.0
  headers: {}
  # Example bearer token via environment expansion:
  # headers:
  #   Authorization: "Bearer ${API_TOKEN}"

reload:
  # POST /admin/reload to refresh config + spec. Set token to require Authorization: Bearer <token>.
  token: ""
  # Poll for spec changes (0 = disabled).
  interval_seconds: 0
  on_sighup: true
